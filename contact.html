<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Залишити слова — Ігор «Слон» Утюж</title>
  <link rel="stylesheet" href="style.css" />

  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body class="page">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">

      <a href="index.html" class="header-logo">
        <div class="header-logo-mark">
          <img src="img/symbol-slon.png" alt="Символ Слон" class="logo-elephant" />
        </div>
        SLON
      </a>

      <nav class="header-nav">
        <a href="index.html#about" data-i18n="menu_about"></a>
        <a href="index.html#war-path" data-i18n="menu_warpath"></a>
        <a href="index.html#life" data-i18n="menu_life"></a>
        <a href="index.html#symbols" data-i18n="menu_symbols"></a>
        <a href="index.html#gratitude" data-i18n="menu_gratitude"></a>
      </nav>

      <div class="header-lang">
        <button data-lang="uk" class="is-active" onclick="setLanguage('uk')">UA</button>
        <button data-lang="en" onclick="setLanguage('en')">EN</button>
      </div>

    </div>
  </header>

  <!-- ===== CONTACT ===== -->
  <section class="section contact-page">
    <div class="contact-inner">

      <a href="index.html" class="contact-back" data-i18n="contact_back"></a>

      <div class="section-header contact-header">
        <div class="section-kicker" data-i18n="contact_kicker"></div>
        <h2 class="section-title contact-title" data-i18n="contact_title"></h2>
        <p class="section-subtitle" data-i18n="contact_subtitle"></p>
      </div>

      <form class="contact-form" id="contactForm">

        <div class="form-row">
          <label for="name">
            <span data-i18n="contact_name_label"></span>
          </label>
          <input
            type="text"
            id="name"
            name="name"
            data-i18n-placeholder="contact_name_placeholder"
            required
          />
        </div>

        <div class="form-row">
          <label for="relation">
            <span data-i18n="contact_relation_label"></span>
            <span class="form-optional" data-i18n="contact_optional"></span>
          </label>
          <input
            type="text"
            id="relation"
            name="relation"
            data-i18n-placeholder="contact_relation_placeholder"
          />
        </div>

        <div class="form-row">
          <label for="email">
            <span data-i18n="contact_email_label"></span>
            <span class="form-optional" data-i18n="contact_optional"></span>
          </label>
          <input
            type="email"
            id="email"
            name="email"
            data-i18n-placeholder="contact_email_placeholder"
          />
        </div>

        <div class="form-row">
          <label for="message">
            <span data-i18n="contact_message_label"></span>
          </label>
          <textarea
            id="message"
            name="message"
            rows="7"
            data-i18n-placeholder="contact_message_placeholder"
            required
          ></textarea>
        </div>

        <div id="formError" class="form-error"></div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" data-i18n="contact_submit"></button>
          <a href="index.html" class="btn btn-ghost" data-i18n="contact_cancel"></a>
        </div>

      </form>

      <!-- повідомлення після відправки -->
      <div id="contactSuccess" class="contact-success">
        <div class="contact-success-icon">🕯️</div>
        <h3 class="contact-success-title" data-i18n="contact_success_title"></h3>
        <p class="contact-success-text" data-i18n="contact_success_text"></p>
        <a href="index.html" class="btn btn-ghost" data-i18n="back_to_home"></a>
      </div>

    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-inner">

      <div class="footer-left">
        <div data-i18n="footer_left_text_1"></div>
        <div data-i18n="footer_left_text_2"></div>
      </div>

      <div class="footer-right">
        <div class="footer-lang" data-i18n="footer_right_text"></div>
        <div class="footer-lang">
          <span class="is-active" data-lang="uk">UA</span>
          <span data-lang="en">EN</span>
        </div>
      </div>

    </div>
  </footer>

  <script>
    // ============================================
    // EmailJS configuration
    // ============================================
    const EMAILJS_PUBLIC_KEY  = "8yPj0R0j8kKZJis61";
    const EMAILJS_SERVICE_ID  = "service_m7gn0er";
    const EMAILJS_TEMPLATE_ID = "template_xsxh01p";

    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

    const form    = document.getElementById("contactForm");
    const success = document.getElementById("contactSuccess");
    const errorEl = document.getElementById("formError");

    // Допоміжна функція: дістати переклад зі словника, що завантажив lang.js.
    // Використовуємо для рантайм-текстів (стан кнопки, помилка), яких немає в DOM.
    function t(key, fallback) {
      try {
        const lang = document.documentElement.getAttribute("lang") || "uk";
        const dict = (window.translationsCache && window.translationsCache[lang]) || {};
        return dict[key] || fallback;
      } catch (e) {
        return fallback;
      }
    }

    if (form) {
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.textContent;

        submitBtn.disabled = true;
        submitBtn.textContent = t("contact_sending", "Надсилаємо...");
        errorEl.textContent = "";
        errorEl.classList.remove("is-visible");

        const templateParams = {
          name:     form.name.value.trim(),
          relation: form.relation.value.trim() || "—",
          email:    form.email.value.trim() || "—",
          message:  form.message.value.trim()
        };

        try {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);

          form.style.display = "none";
          success.classList.add("is-visible");
          success.scrollIntoView({ behavior: "smooth", block: "center" });

        } catch (err) {
          console.error("EmailJS error:", err);
          errorEl.textContent = t("contact_error", "Не вдалося надіслати повідомлення. Перевірте з'єднання та спробуйте ще раз.");
          errorEl.classList.add("is-visible");

          submitBtn.disabled = false;
          submitBtn.textContent = originalText;
        }
      });
    }
  </script>

  <script src="lang.js"></script>
</body>
</html>
